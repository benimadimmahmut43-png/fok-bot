<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Fok AI</title>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        :root { --bg: #000000; --sidebar: #0a0a0a; --accent: #ffffff; }
        body { font-family: 'Inter', sans-serif; background-color: var(--bg); color: #fff; margin: 0; display: flex; height: 100vh; }
        
        #sidebar { 
            width: 250px; background: var(--sidebar); border-right: 1px solid #111; 
            display: flex; flex-direction: column; padding: 25px; transition: 0.3s; overflow: hidden;
        }
        #sidebar.closed { width: 0; padding: 0; border: none; opacity: 0; }

        .brand { font-size: 20px; font-weight: 900; margin-bottom: 40px; letter-spacing: 2px; }
        .new-chat { background: #fff; color: #000; border: none; padding: 12px; border-radius: 8px; cursor: pointer; font-weight: 700; width: 100%; white-space: nowrap; }

        #main { flex: 1; display: flex; flex-direction: column; }
        .nav { padding: 20px; display: flex; align-items: center; }
        .toggle-btn { background: none; border: none; color: #fff; font-size: 22px; cursor: pointer; opacity: 0.5; }
        .toggle-btn:hover { opacity: 1; }

        #chat-window { flex: 1; overflow-y: auto; padding: 40px 20%; display: flex; flex-direction: column; gap: 40px; }
        .msg-row { display: flex; gap: 20px; animation: fadeIn 0.4s ease; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
        .icon { font-size: 24px; min-width: 30px; }
        .text { font-size: 16px; color: #ccc; line-height: 1.6; }

        .bottom { padding: 40px 20%; }
        .input-wrap { background: #111; border: 1px solid #222; border-radius: 12px; padding: 8px 18px; display: flex; align-items: center; }
        input { flex: 1; background: transparent; border: none; color: #fff; padding: 12px; outline: none; }
        #send { background: none; border: none; color: #fff; cursor: pointer; font-size: 20px; }
    </style>
</head>
<body>
    <div id="sidebar">
        <div class="brand">FOK.AI</div>
        <button class="new-chat" onclick="location.reload()">YENİ SOHBET</button>
        <div style="margin-top: auto; border-top: 1px solid #1a1a1a; padding-top: 20px;">
            <p style="color: #444; font-size: 10px; font-weight: bold; margin-bottom: 5px;">YAPIMCI</p>
            <div style="font-size: 14px; white-space: nowrap;">Yusuf Kerem Köse</div>
        </div>
    </div>
    <div id="main">
        <div class="nav"><button class="toggle-btn" onclick="toggleSide()"><i class="fas fa-bars"></i></button></div>
        <div id="chat-window"><div id="start" style="text-align: center; margin-top: 20vh; opacity: 0.1;"><h1 style="font-size: 80px;">🦭</h1></div></div>
        <div class="bottom">
            <div class="input-wrap">
                <input type="text" id="user-input" placeholder="Bir şeyler yaz..." onkeypress="if(event.key==='Enter') send()">
                <button id="send" onclick="send()"><i class="fas fa-arrow-up"></i></button>
            </div>
        </div>
    </div>
    <script>
        function toggleSide() { document.getElementById('sidebar').classList.toggle('closed'); }
        async function send() {
            const input = document.getElementById("user-input");
            const chat = document.getElementById("chat-window");
            const text = input.value.trim();
            if (!text) return;
            if(document.getElementById("start")) document.getElementById("start").remove();
            chat.innerHTML += `<div class="msg-row"><div class="icon">👤</div><div class="text">${text}</div></div>`;
            input.value = "";
            chat.scrollTop = chat.scrollHeight;
            const res = await fetch("/get_response", {
                method: "POST", headers: { "Content-Type": "application/json" },
                body: JSON.stringify({ message: text })
            });
            const data = await res.json();
            chat.innerHTML += `<div class="msg-row"><div class="icon">🦭</div><div class="text">${data.reply}</div></div>`;
            chat.scrollTop = chat.scrollHeight;
        }
    </script>
</body>
</html>
