<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Fok AI - Ultra</title>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        :root {
            --bg-dark: #0f0f10;
            --glass: rgba(255, 255, 255, 0.05);
            --accent: #4285f4;
            --text-main: #e8eaed;
        }

        body {
            font-family: 'Inter', -apple-system, sans-serif;
            background-color: var(--bg-dark);
            background-image: radial-gradient(circle at 50% -20%, #1e1f2b, #0f0f10);
            color: var(--text-main);
            margin: 0;
            display: flex;
            height: 100vh;
        }

        /* Sidebar Gelişmiş */
        #sidebar {
            width: 280px;
            background: rgba(0, 0, 0, 0.2);
            backdrop-filter: blur(10px);
            display: flex;
            flex-direction: column;
            padding: 20px;
            border-right: 1px solid rgba(255,255,255,0.05);
        }

        .new-btn {
            background: linear-gradient(90deg, #4285f4, #34a853);
            border: none;
            color: white;
            padding: 15px;
            border-radius: 12px;
            cursor: pointer;
            font-weight: 600;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            transition: 0.3s;
        }
        .new-btn:hover { transform: scale(1.02); box-shadow: 0 5px 15px rgba(66, 133, 244, 0.3); }

        /* Sohbet Alanı */
        #main-chat {
            flex: 1;
            display: flex;
            flex-direction: column;
            position: relative;
        }

        #chat-window {
            flex: 1;
            overflow-y: auto;
            padding: 40px 15% 100px 15%;
            display: flex;
            flex-direction: column;
            gap: 32px;
        }

        .message-row {
            display: flex;
            gap: 24px;
            width: 100%;
            animation: slideUp 0.4s ease-out;
        }

        @keyframes slideUp { from { opacity: 0; transform: translateY(20px); } }

        .icon {
            width: 42px;
            height: 42px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            flex-shrink: 0;
            box-shadow: 0 4px 10px rgba(0,0,0,0.3);
        }

        .user-icon { background: #3c4043; font-size: 18px; }
        .bot-icon { background: transparent; font-size: 32px; }

        .text {
            font-size: 16px;
            line-height: 1.7;
            color: #ddd;
            max-width: 85%;
        }

        /* Input Alanı Profesyonel */
        .bottom-area {
            position: absolute;
            bottom: 0;
            width: 100%;
            padding: 30px 15%;
            background: linear-gradient(transparent, var(--bg-dark) 40%);
        }

        .input-box {
            background: var(--glass);
            border: 1px solid rgba(255,255,255,0.1);
            border-radius: 30px;
            padding: 10px 25px;
            display: flex;
            align-items: center;
            backdrop-filter: blur(20px);
        }

        input {
            flex: 1;
            background: transparent;
            border: none;
            color: white;
            padding: 15px;
            font-size: 16px;
            outline: none;
        }

        #send-btn {
            background: var(--accent);
            color: white;
            width: 40px;
            height: 40px;
            border-radius: 50%;
            border: none;
            cursor: pointer;
            transition: 0.2s;
        }
        #send-btn:hover { background: #357ae8; transform: rotate(10deg); }

        /* Loading */
        .typing { color: var(--accent); font-size: 13px; margin-left: 66px; display: none; margin-bottom: 10px; }
    </style>
</head>
<body>

    <div id="sidebar">
        <button class="new-btn" onclick="location.reload()"><i class="fas fa-plus"></i> Yeni Sohbet</button>
        <p style="margin-top: 30px; color: #5f6368; font-size: 12px; font-weight: bold;">YAPIMCILAR</p>
        <div style="font-size: 14px; color: #8e918f;"><i class="fas fa-crown"></i> Yusuf Kerem Köse</div>
        <div style="font-size: 14px; color: #8e918f; margin-top: 10px;"><i class="fas fa-crown"></i> Kerem Gökalp Sukan</div>
    </div>

    <div id="main-chat">
        <div id="chat-window">
            <div id="start-msg" style="text-align: center; margin-top: 15vh;">
                <h1 style="font-size: 52px; font-weight: 700; margin-bottom: 10px; letter-spacing: -1px;">🦭</h1>
                <h2 style="font-size: 32px; background: linear-gradient(to right, #4285f4, #ea4335); -webkit-background-clip: text; -webkit-text-fill-color: transparent;">Nasıl yardımcı olabilirim?</h2>
            </div>
        </div>

        <div id="typing" class="typing">Fok dalıyor... 🌊</div>

        <div class="bottom-area">
            <div class="input-box">
                <input type="text" id="user-input" placeholder="Fok'a bir şeyler sor..." autocomplete="off" onkeypress="if(event.key==='Enter') sendMessage()">
                <button id="send-btn" onclick="sendMessage()"><i class="fas fa-paper-plane"></i></button>
            </div>
        </div>
    </div>

    <script>
        async function sendMessage() {
            const input = document.getElementById("user-input");
            const text = input.value.trim();
            if (!text) return;

            const chat = document.getElementById("chat-window");
            const startMsg = document.getElementById("start-msg");
            if(startMsg) startMsg.remove();

            // SENİN MESAJIN
            chat.innerHTML += `
                <div class="message-row">
                    <div class="icon user-icon"><i class="fas fa-user"></i></div>
                    <div class="text">${text}</div>
                </div>
            `;
            
            input.value = "";
            document.getElementById("typing").style.display = "block";
            chat.scrollTop = chat.scrollTop + 500;

            const res = await fetch("/get_response", {
                method: "POST",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify({ message: text })
            });
            const data = await res.json();
            
            document.getElementById("typing").style.display = "none";

            // FOK CEVABI
            chat.innerHTML += `
                <div class="message-row">
                    <div class="icon bot-icon">🦭</div>
                    <div class="text">${data.reply}</div>
                </div>
            `;
            chat.scrollTop = chat.scrollHeight;
        }
    </script>
</body>
</html>
