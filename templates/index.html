<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Fok v15 - Yapay Zeka</title>
    <style>
        * { box-sizing: border-box; font-family: 'Segoe UI', sans-serif; }
        body { background-color: #ffffff; margin: 0; display: flex; flex-direction: column; height: 100vh; }
        
        /* Mesaj Alanı */
        #chat-container { flex: 1; overflow-y: auto; padding: 20px; display: flex; flex-direction: column; gap: 20px; }
        .message { max-width: 80%; padding: 15px; border-radius: 15px; line-height: 1.5; position: relative; }
        
        /* Kullanıcı Mesajı */
        .user-message { align-self: flex-end; background-color: #f1f3f4; color: #1f1f1f; border-bottom-right-radius: 2px; }
        
        /* Fok (Bot) Mesajı */
        .bot-message { align-self: flex-start; background-color: #e8f0fe; color: #1967d2; border-bottom-left-radius: 2px; }
        .bot-message::before { content: "🦭 "; }

        /* Giriş Alanı */
        .input-area { padding: 30px; background: white; border-top: 1px solid #eee; display: flex; justify-content: center; }
        .input-wrapper { width: 100%; max-width: 800px; display: flex; background: #f1f3f4; padding: 10px 20px; border-radius: 30px; }
        input { flex: 1; border: none; background: transparent; outline: none; font-size: 16px; padding: 10px; }
        button { background: none; border: none; cursor: pointer; font-size: 20px; transition: 0.2s; }
        button:hover { transform: scale(1.1); }
    </style>
</head>
<body>

    <div id="chat-container">
        <div class="message bot-message">Merhaba! Ben Fok. Bugün sana nasıl yardımcı olabilirim?</div>
    </div>

    <div class="input-area">
        <div class="input-wrapper">
            <input type="text" id="user-input" placeholder="Fok'a bir şeyler yaz..." onkeypress="handleKeyPress(event)">
            <button onclick="sendMessage()">🚀</button>
        </div>
    </div>

    <script>
        async function sendMessage() {
            const input = document.getElementById('user-input');
            const container = document.getElementById('chat-container');
            const message = input.value.trim();

            if (!message) return;

            // Kullanıcı mesajını ekle
            container.innerHTML += `<div class="message user-message">${message}</div>`;
            input.value = '';
            container.scrollTop = container.scrollHeight;

            // Backend'e (Python) istek at
            try {
                const response = await fetch('/get_response', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ message: message })
                });
                const data = await response.json();
                
                // Bot cevabını ekle
                container.innerHTML += `<div class="message bot-message">${data.reply}</div>`;
                container.scrollTop = container.scrollHeight;
            } catch (error) {
                container.innerHTML += `<div class="message bot-message">Ups! Bir bağlantı sorunu oldu.</div>`;
            }
        }

        function handleKeyPress(e) {
            if (e.key === 'Enter') sendMessage();
        }
    </script>
</body>
</html>
