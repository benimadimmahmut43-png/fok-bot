<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Fok AI</title>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        :root {
            --bg-color: #09090b; /* Bu değişken arka planı kontrol eder */
            --sidebar-bg: rgba(0, 0, 0, 0.3);
            --accent: #4285f4;
            --text: #e2e2e2;
        }

        body {
            font-family: 'Inter', sans-serif;
            background-color: var(--bg-color);
            color: var(--text);
            margin: 0;
            display: flex;
            height: 100vh;
            overflow: hidden;
            transition: background-color 0.5s ease; /* Renk geçişi yumuşak olsun */
        }

        /* Yan Panel Ayarı */
        #sidebar {
            width: 260px;
            background: var(--sidebar-bg);
            border-right: 1px solid rgba(255,255,255,0.1);
            display: flex;
            flex-direction: column;
            padding: 20px;
            transition: all 0.3s ease;
            overflow: hidden; /* Kapandığında içeriğin taşmasını önler */
        }

        #sidebar.closed {
            width: 0;
            padding: 0;
            border-right: none;
            opacity: 0;
            pointer-events: none;
        }

        .brand { font-size: 22px; font-weight: 800; margin-bottom: 30px; color: var(--accent); white-space: nowrap; }

        .new-chat {
            background: rgba(255,255,255,0.05);
            border: 1px solid rgba(255,255,255,0.1);
            color: white;
            padding: 12px;
            border-radius: 12px;
            cursor: pointer;
            text-align: center;
            white-space: nowrap;
        }

        /* Ana İçerik */
        #main-content { flex: 1; display: flex; flex-direction: column; position: relative; }

        .top-nav { padding: 15px 25px; display: flex; justify-content: space-between; align-items: center; }

        .menu-btn, .theme-btn {
            background: none; border: none; color: #888; font-size: 22px; cursor: pointer; z-index: 1001;
        }

        .theme-menu {
            position: absolute; top: 60px; right: 25px; 
            background: #18181b; border: 1px solid rgba(255,255,255,0.1);
            padding: 10px; border-radius: 12px; display: none; gap: 10px; z-index: 1000;
        }

        .color-dot { width: 25px; height: 25px; border-radius: 50%; cursor: pointer; border: 2px solid white; }

        /* Sohbet Alanı */
        #chat-window { flex: 1; overflow-y: auto; padding: 40px 15%; display: flex; flex-direction: column; gap: 30px; }
        .message-row { display: flex; gap: 20px; width: 100%; }
        .icon { width: 38px; height: 38px; border-radius: 10px; display: flex; align-items: center; justify-content: center; flex-shrink: 0; }
        .bot-icon { font-size: 28px; }
        .user-icon { background: rgba(255,255,255,0.1); }

        /* Input */
        .bottom-area { padding: 30px 15%; }
        .input-container {
            background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.1);
            border-radius: 18px; padding: 8px 15px; display: flex; align-items: center;
        }
        input { flex: 1; background: transparent; border: none; color: white; padding: 12px; outline: none; }
        #send-btn { color: var(--accent); background: none; border: none; font-size: 24px; cursor: pointer; }
    </style>
</head>
<body>

    <div id="sidebar">
        <div class="brand">🦭 FOK AI</div>
        <button class="new-chat" onclick="location.reload()">+ Yeni Sohbet</button>
        
        <div style="margin-top: auto; padding: 15px; background: rgba(255,255,255,0.03); border-radius: 10px;">
            <p style="color: #666; font-size: 11px; margin-bottom: 10px;">YAPIMCILAR</p>
            <div style="font-size: 14px; margin-bottom: 5px;">Yusuf Kerem Köse</div>
            <div style="font-size: 14px;">Kerem Gökalp Sukan</div>
        </div>
    </div>

    <div id="main-content">
        <div class="top-nav">
            <button class="menu-btn" onclick="toggleSidebar()"><i class="fas fa-bars"></i></button>
            <div style="position: relative;">
                <button class="theme-btn" onclick="toggleTheme()"><i class="fas fa-eye"></i> Arka Plan</button>
                <div id="theme-menu" class="theme-menu">
                    <div class="color-dot" style="background:#09090b" onclick="changeBg('#09090b')"></div> <div class="color-dot" style="background:#1a1a2e" onclick="changeBg('#1a1a2e')"></div> <div class="color-dot" style="background:#1b271b" onclick="changeBg('#1b271b')"></div> <div class="color-dot" style="background:#2d1b1b" onclick="changeBg('#2d1b1b')"></div> </div>
            </div>
        </div>

        <div id="chat-window">
            <div id="welcome" style="text-align:center; margin-top:15vh; opacity: 0.5;">
                <h1 style="font-size: 60px;">🦭</h1>
                <p>Selam, ben Fok. Nasıl yardımcı olabilirim?</p>
            </div>
        </div>

        <div class="bottom-area">
            <div class="input-container">
                <input type="text" id="user-input" placeholder="Mesajınızı buraya yazın..." onkeypress="if(event.key==='Enter') sendMessage()">
                <button id="send-btn" onclick="sendMessage()"><i class="fas fa-paper-plane"></i></button>
            </div>
        </div>
    </div>

    <script>
        function toggleSidebar() {
            const sidebar = document.getElementById('sidebar');
            sidebar.classList.toggle('closed');
        }

        function toggleTheme() {
            const menu = document.getElementById('theme-menu');
            menu.style.display = menu.style.display === 'flex' ? 'none' : 'flex';
        }

        function changeBg(color) {
            document.documentElement.style.setProperty('--bg-color', color);
            toggleTheme();
        }

        async function sendMessage() {
            const input = document.getElementById("user-input");
            const chat = document.getElementById("chat-window");
            const text = input.value.trim();
            if (!text) return;

            if(document.getElementById("welcome")) document.getElementById("welcome").remove();

            chat.innerHTML += `<div class="message-row"><div class="icon user-icon"><i class="fas fa-user"></i></div><div class="text">${text}</div></div>`;
            input.value = "";
            chat.scrollTop = chat.scrollHeight;

            const res = await fetch("/get_response", {
                method: "POST",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify({ message: text })
            });
            const data = await res.json();
            
            chat.innerHTML += `<div class="message-row"><div class="icon bot-icon">🦭</div><div class="text">${data.reply}</div></div>`;
            chat.scrollTop = chat.scrollHeight;
        }
    </script>
</body>
</html>
