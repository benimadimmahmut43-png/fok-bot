<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FOK AI</title>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        :root {
            --bg-color: #131314;
            --sidebar-bg: #1e1f20;
            --text-color: #e3e3e3;
            --input-bg: #1e1f20;
            --accent-color: #4285f4;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            margin: 0;
            display: flex;
            height: 100vh;
            overflow: hidden;
        }

        /* Kenar Çubuğu */
        #sidebar {
            width: 260px;
            background-color: var(--sidebar-bg);
            display: flex;
            flex-direction: column;
            padding: 15px;
            border-right: 1px solid #333;
        }

        .new-chat {
            background: #2d2f31;
            padding: 12px;
            border-radius: 25px;
            text-align: center;
            cursor: pointer;
            font-size: 14px;
            margin-bottom: 20px;
            transition: 0.3s;
        }
        .new-chat:hover { background: #3c3e41; }

        /* Ana Sohbet Alanı */
        #main-chat {
            flex: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            position: relative;
        }

        #chat-window {
            width: 100%;
            max-width: 800px;
            flex: 1;
            overflow-y: auto;
            padding: 40px 20px;
            display: flex;
            flex-direction: column;
            gap: 30px;
            scroll-behavior: smooth;
        }

        .message-row {
            display: flex;
            gap: 20px;
            width: 100%;
            animation: fadeIn 0.3s ease;
        }

        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

        .icon {
            width: 36px;
            height: 36px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            flex-shrink: 0;
            font-size: 20px;
        }

        .user-icon { background: #5c5c5c; color: white; font-size: 16px; }
        .bot-icon { background: transparent; font-size: 28px; }

        .text {
            line-height: 1.6;
            font-size: 16px;
            white-space: pre-wrap;
            padding-top: 5px;
        }

        /* Giriş Alanı */
        .input-container {
            width: 100%;
            max-width: 800px;
            padding: 20px;
            box-sizing: border-box;
            background-color: var(--bg-color);
        }

        .input-wrapper {
            background-color: var(--input-bg);
            border-radius: 28px;
            padding: 10px 20px;
            display: flex;
            align-items: center;
            border: 1px solid transparent;
            transition: 0.3s;
        }

        .input-wrapper:focus-within {
            border-color: #555;
            background-color: #28292a;
        }

        input {
            flex: 1;
            background: transparent;
            border: none;
            color: white;
            padding: 12px;
            font-size: 16px;
            outline: none;
        }

        button {
            background: transparent;
            border: none;
            color: #8e918f;
            cursor: pointer;
            font-size: 20px;
            padding: 5px;
        }

        button:hover { color: var(--accent-color); }

        .typing { color: #8e918f; font-size: 13px; display: none; margin-bottom: 10px; }
    </style>
</head>
<body>

    <div id="sidebar">
        <div class="new-chat" onclick="window.location.reload()"><i class="fas fa-plus"></i> Yeni Sohbet</div>
        <div style="font-size: 12px; color: #8e918f; padding-left: 10px;">Geçmiş Sohbetler</div>
    </div>

    <div id="main-chat">
        <div id="chat-window">
            <div id="welcome-screen" style="text-align: center; margin-top: 100px;">
                <h1 style="font-size: 40px; background: linear-gradient(to right, #4285f4, #9b72cb, #d96570); -webkit-background-clip: text; -webkit-text-fill-color: transparent; font-weight: 500;">Merhaba, Ben Fok</h1>
                <p style="color: #8e918f; font-size: 18px;">Bugün sana nasıl yardımcı olabilirim?</p>
            </div>
        </div>

        <div id="typing-indicator" class="typing">Fok düşünüyor...</div>

        <div class="input-container">
            <div class="input-wrapper">
                <input type="text" id="user-input" placeholder="Buraya bir şeyler yazın..." onkeypress="if(event.key==='Enter') sendMessage()">
                <button onclick="sendMessage()"><i class="fas fa-paper-plane"></i></button>
            </div>
            <p style="text-align: center; font-size: 11px; color: #8e918f; margin-top: 10px;">Fok AI bazen hatalı bilgi verebilir.</p>
        </div>
    </div>

    <script>
        async function sendMessage() {
            const input = document.getElementById("user-input");
            const chatWindow = document.getElementById("chat-window");
            const welcome = document.getElementById("welcome-screen");
            const typing = document.getElementById("typing-indicator");
            const text = input.value.trim();
            
            if (!text) return;

            if(welcome) welcome.remove();

            // KULLANICI MESAJI (👤 İkonlu)
            chatWindow.innerHTML += `
                <div class="message-row">
                    <div class="icon user-icon"><i class="fas fa-user"></i></div>
                    <div class="text">${text}</div>
                </div>
            `;
            
            input.value = "";
            typing.style.display = "block";
            chatWindow.scrollTop = chatWindow.scrollHeight;

            try {
                const response = await fetch("/get_response", {
                    method: "POST",
                    headers: { "Content-Type": "application/json" },
                    body: JSON.stringify({ message: text })
                });
                const data = await response.json();
                
                typing.style.display = "none";
                
                // BOT MESAJI (🦭 İkonlu)
                chatWindow.innerHTML += `
                    <div class="message-row">
                        <div class="icon bot-icon">🦭</div>
                        <div class="text">${data.reply}</div>
                    </div>
                `;
            } catch (e) {
                typing.style.display = "none";
                chatWindow.innerHTML += `<div class="message-row"><div class="text" style="color:red;">Hata: Bağlantı kurulamadı.</div></div>`;
            }
            chatWindow.scrollTop = chatWindow.scrollHeight;
        }
    </script>
</body>
</html>
