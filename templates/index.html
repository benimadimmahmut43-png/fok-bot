<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Fok AI Ultra</title>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        :root {
            --bg-dark: #09090b;
            --sidebar-bg: #111114;
            --accent: #4285f4; /* Varsayılan renk */
            --glass: rgba(255, 255, 255, 0.03);
            --border: rgba(255, 255, 255, 0.08);
            --text: #e2e2e2;
        }

        body {
            font-family: 'Inter', -apple-system, sans-serif;
            background-color: var(--bg-dark);
            color: var(--text);
            margin: 0;
            display: flex;
            height: 100vh;
            overflow: hidden;
            transition: all 0.3s ease;
        }

        /* Yan Panel */
        #sidebar {
            width: 260px;
            background: var(--sidebar-bg);
            border-right: 1px solid var(--border);
            display: flex;
            flex-direction: column;
            padding: 20px;
            transition: transform 0.3s ease, width 0.3s ease;
            position: relative;
            z-index: 100;
        }

        #sidebar.closed {
            width: 0;
            padding: 0;
            transform: translateX(-100%);
            border-right: none;
        }

        .brand {
            font-size: 22px;
            font-weight: 800;
            margin-bottom: 30px;
            display: flex;
            align-items: center;
            gap: 10px;
            color: var(--accent);
        }

        .new-chat {
            background: var(--glass);
            border: 1px solid var(--border);
            color: white;
            padding: 12px;
            border-radius: 12px;
            cursor: pointer;
            text-align: center;
            font-weight: 500;
            transition: 0.2s;
        }
        .new-chat:hover { background: var(--accent); color: white; border-color: var(--accent); }

        /* Ana Alan */
        #main-content {
            flex: 1;
            display: flex;
            flex-direction: column;
            position: relative;
        }

        /* Üst Bar (Menü ve Tema Seçici) */
        .top-nav {
            padding: 15px 25px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid var(--border);
        }

        .menu-toggle, .theme-btn {
            background: none;
            border: none;
            color: #888;
            font-size: 20px;
            cursor: pointer;
            transition: 0.2s;
        }
        .menu-toggle:hover, .theme-btn:hover { color: var(--accent); }

        .theme-options {
            position: absolute;
            top: 60px;
            right: 25px;
            background: #18181b;
            border: 1px solid var(--border);
            padding: 10px;
            border-radius: 12px;
            display: none;
            gap: 10px;
            z-index: 1000;
        }

        .dot { width: 25px; height: 25px; border-radius: 50%; cursor: pointer; border: 2px solid transparent; }
        .dot:hover { transform: scale(1.1); }

        /* Sohbet Penceresi */
        #chat-window {
            flex: 1;
            overflow-y: auto;
            padding: 40px 15%;
            display: flex;
            flex-direction: column;
            gap: 30px;
        }

        .message-row { display: flex; gap: 20px; animation: slideUp 0.4s ease; width: 100%; }
        @keyframes slideUp { from { opacity: 0; transform: translateY(15px); } }

        .icon {
            width: 38px; height: 38px; border-radius: 10px;
            display: flex; align-items: center; justify-content: center; flex-shrink: 0;
        }
        .user-icon { background: var(--glass); border: 1px solid var(--border); }
        .bot-icon { background: transparent; font-size: 28px; }

        .text { line-height: 1.6; font-size: 16px; color: #d4d4d8; padding-top: 5px; }

        /* Giriş Alanı */
        .bottom-area { padding: 30px 15%; background: linear-gradient(transparent, var(--bg-dark) 30%); }
        .input-container {
            background: var(--glass);
            border: 1px solid var(--border);
            border-radius: 18px;
            padding: 8px 15px;
            display: flex;
            align-items: center;
            backdrop-filter: blur(10px);
        }
        input {
            flex: 1; background: transparent; border: none; color: white;
            padding: 12px; font-size: 16px; outline: none;
        }
        #send-btn { color: var(--accent); background: none; border: none; cursor: pointer; font-size: 22px; }

        .status-text { text-align: center; font-size: 11px; color: #52525b; margin-top: 10px; }
    </style>
</head>
<body>

    <div id="sidebar">
        <div class="brand">🦭 FOK AI</div>
        <button class="new-chat" onclick="location.reload()">+ Yeni Sohbet</button>
        <div style="margin-top: auto; padding: 15px; background: var(--glass); border-radius: 10px; font-size: 13px;">
            <p style="color: #71717a; margin: 0 0 10px 0;">YAPIMCILAR</p>
            <div style="margin-bottom: 5px;"><i class="fas fa-crown" style="color:gold"></i> Y. Kerem Köse</div>
            <div><i class="fas fa-crown" style="color:gold"></i> K. Gökalp Sukan</div>
        </div>
    </div>

    <div id="main-content">
        <div class="top-nav">
            <button class="menu-toggle" onclick="toggleSidebar()"><i class="fas fa-bars"></i></button>
            <div style="position: relative;">
                <button class="theme-btn" onclick="toggleThemeMenu()"><i class="fas fa-palette"></i></button>
                <div id="theme-menu" class="theme-options">
                    <div class="dot" style="background:#4285f4" onclick="setTheme('#4285f4')"></div>
                    <div class="dot" style="background:#a855f7" onclick="setTheme('#a855f7')"></div>
                    <div class="dot" style="background:#22c55e" onclick="setTheme('#22c55e')"></div>
                    <div class="dot" style="background:#f97316" onclick="setTheme('#f97316')"></div>
                </div>
            </div>
        </div>

        <div id="chat-window">
            <div id="welcome" style="text-align:center; margin-top:10vh;">
                <h1 style="font-size: 48px; font-weight: 800; letter-spacing: -1px;">🦭</h1>
                <h2 style="font-size: 32px; font-weight: 700;">Selam kanka, ben Fok.</h2>
                <p style="color: #71717a;">Bugün nelerden bahsediyoruz?</p>
            </div>
        </div>

        <div class="bottom-area">
            <div class="input-container">
                <input type="text" id="user-input" placeholder="Bir mesaj yaz..." onkeypress="if(event.key==='Enter') sendMessage()">
                <button id="send-btn" onclick="sendMessage()"><i class="fas fa-arrow-circle-up"></i></button>
            </div>
            <div class="status-text">Fok AI V6.0 | Mükemmel Tasarım</div>
        </div>
    </div>

    <script>
        function toggleSidebar() {
            document.getElementById('sidebar').classList.toggle('closed');
        }

        function toggleThemeMenu() {
            const menu = document.getElementById('theme-menu');
            menu.style.display = menu.style.display === 'flex' ? 'none' : 'flex';
        }

        function setTheme(color) {
            document.documentElement.style.setProperty('--accent', color);
            toggleThemeMenu();
        }

        async function sendMessage() {
            const input = document.getElementById("user-input");
            const chat = document.getElementById("chat-window");
            const welcome = document.getElementById("welcome");
            const text = input.value.trim();
            if (!text) return;

            if(welcome) welcome.remove();

            chat.innerHTML += `<div class="message-row"><div class="icon user-icon"><i class="fas fa-user"></i></div><div class="text">${text}</div></div>`;
            input.value = "";
            chat.scrollTop = chat.scrollHeight;

            const response = await fetch("/get_response", {
                method: "POST",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify({ message: text })
            });
            const data = await response.json();
            
            chat.innerHTML += `<div class="message-row"><div class="icon bot-icon">🦭</div><div class="text">${data.reply}</div></div>`;
            chat.scrollTop = chat.scrollHeight;
        }
    </script>
</body>
</html>
