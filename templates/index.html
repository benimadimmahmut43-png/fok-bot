<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Fok AI - Ultra</title>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        :root {
            --bg: #111118;
            --sidebar: rgba(0, 0, 0, 0.4);
            --accent: #4285f4;
            --text: #ffffff;
        }

        body {
            font-family: 'Inter', sans-serif;
            background-color: var(--bg);
            color: var(--text);
            margin: 0;
            display: flex;
            height: 100vh;
            transition: background-color 0.4s ease;
        }

        /* Yan Panel Ayarları */
        #sidebar {
            width: 250px;
            background: var(--sidebar);
            border-right: 1px solid rgba(255,255,255,0.05);
            display: flex;
            flex-direction: column;
            padding: 25px;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            overflow: hidden;
        }

        #sidebar.closed {
            width: 0;
            padding: 0;
            border-right: none;
            opacity: 0;
            pointer-events: none;
        }

        .brand { font-size: 22px; font-weight: 900; margin-bottom: 30px; color: var(--accent); white-space: nowrap; }

        .new-chat {
            background: rgba(255,255,255,0.1);
            border: 1px solid rgba(255,255,255,0.1);
            color: white;
            padding: 12px;
            border-radius: 10px;
            cursor: pointer;
            font-weight: 600;
            white-space: nowrap;
        }
        .new-chat:hover { background: #fff; color: #000; }

        /* Ana Alan */
        #main { flex: 1; display: flex; flex-direction: column; position: relative; }

        .nav { padding: 15px 25px; display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid rgba(255,255,255,0.05); }

        .icon-btn { background: none; border: none; color: #888; font-size: 22px; cursor: pointer; transition: 0.2s; }
        .icon-btn:hover { color: #fff; }

        /* Tema Menüsü */
        .theme-box {
            position: absolute; top: 65px; right: 25px;
            background: #1e1e26; border: 1px solid rgba(255,255,255,0.1);
            padding: 15px; border-radius: 15px; display: none;
            grid-template-columns: repeat(4, 1fr); gap: 10px; z-index: 1000;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }

        .dot { width: 30px; height: 30px; border-radius: 8px; cursor: pointer; border: 2px solid rgba(255,255,255,0.2); }
        .dot:hover { transform: scale(1.1); border-color: #fff; }

        /* Chat Penceresi */
        #chat-window { flex: 1; overflow-y: auto; padding: 40px 18%; display: flex; flex-direction: column; gap: 35px; }
        .msg-row { display: flex; gap: 20px; animation: fadeInUp 0.4s ease; }
        @keyframes fadeInUp { from { opacity: 0; transform: translateY(10px); } }
        .icon { font-size: 24px; min-width: 35px; text-align: center; }
        .text { font-size: 16px; color: #ddd; line-height: 1.6; }

        /* Giriş Alanı */
        .bottom { padding: 30px 18%; }
        .input-wrap {
            background: rgba(255,255,255,0.05);
            border: 1px solid rgba(255,255,255,0.1);
            border-radius: 15px; padding: 10px 20px; display: flex; align-items: center;
        }
        input { flex: 1; background: transparent; border: none; color: #fff; padding: 12px; outline: none; font-size: 16px; }
        #send { color: var(--accent); background: none; border: none; cursor: pointer; font-size: 24px; }
    </style>
</head>
<body>

    <div id="sidebar">
        <div class="brand">🦭 FOK AI</div>
        <button class="new-chat" onclick="location.reload()">+ Yeni Sohbet</button>
        
        <div style="margin-top: auto; padding-top: 20px; border-top: 1px solid rgba(255,255,255,0.05);">
            <p style="color: #555; font-size: 11px; font-weight: bold; margin-bottom: 10px;">YAPIMCI</p>
            <div style="font-size: 14px; white-space: nowrap;">Yusuf Kerem Köse</div>
        </div>
    </div>

    <div id="main">
        <div class="nav">
            <button class="icon-btn" onclick="toggleSide()"><i class="fas fa-bars"></i></button>
            <button class="icon-btn" onclick="toggleTheme()"><i class="fas fa-palette"></i></button>
            <div id="theme-menu" class="theme-box">
                <div class="dot" style="background:#111118" title="Klasik" onclick="setBg('#111118')"></div>
                <div class="dot" style="background:#1a1a2e" title="Gece" onclick="setBg('#1a1a2e')"></div>
                <div class="dot" style="background:#1b271b" title="Orman" onclick="setBg('#1b271b')"></div>
                <div class="dot" style="background:#2d1b1b" title="Şarap" onclick="setBg('#2d1b1b')"></div>
                <div class="dot" style="background:#1e1e26" title="Füme" onclick="setBg('#1e1e26')"></div>
                <div class="dot" style="background:#000000" title="Saf Siyah" onclick="setBg('#000000')"></div>
                <div class="dot" style="background:#232946" title="Uzay" onclick="setBg('#232946')"></div>
                <div class="dot" style="background:#0f172a" title="Modern" onclick="setBg('#0f172a')"></div>
            </div>
        </div>

        <div id="chat-window">
            <div id="start" style="text-align: center; margin-top: 15vh; opacity: 0.3;">
                <span style="font-size: 100px;">🦭</span> </div>
        </div>

        <div class="bottom">
            <div class="input-wrap">
                <input type="text" id="user-input" placeholder="Fok seninle..." onkeypress="if(event.key==='Enter') send()">
                <button id="send" onclick="send()"><i class="fas fa-paper-plane"></i></button>
            </div>
        </div>
    </div>

    <script>
        function toggleSide() { document.getElementById('sidebar').classList.toggle('closed'); }
        function toggleTheme() {
            const menu = document.getElementById('theme-menu');
            menu.style.display = menu.style.display === 'grid' ? 'none' : 'grid';
        }
        function setBg(color) {
            document.documentElement.style.setProperty('--bg', color);
            toggleTheme();
        }

        async function send() {
            const input = document.getElementById("user-input");
            const chat = document.getElementById("chat-window");
            const text = input.value.trim();
            if (!text) return;

            if(document.getElementById("start")) document.getElementById("start").remove();
            chat.innerHTML += `<div class="msg-row"><div class="icon">👤</div><div class="text">${text}</div></div>`;
            input.value = "";
            chat.scrollTop = chat.scrollHeight;

            const res = await fetch("/get_response", {
                method: "POST", headers: { "Content-Type": "application/json" },
                body: JSON.stringify({ message: text })
            });
            const data = await res.json();
            chat.innerHTML += `<div class="msg-row"><div class="icon">🦭</div><div class="text">${data.reply}</div></div>`;
            chat.scrollTop = chat.scrollHeight;
        }
    </script>
</body>
</html>
