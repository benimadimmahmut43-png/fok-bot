<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Fok AI</title>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        :root {
            --bg: #0b0b0c;
            --glass: rgba(255, 255, 255, 0.03);
            --accent: #4285f4;
            --border: rgba(255, 255, 255, 0.1);
        }

        body {
            font-family: 'Segoe UI', system-ui, sans-serif;
            background-color: var(--bg);
            color: #ffffff;
            margin: 0;
            display: flex;
            height: 100vh;
        }

        /* Havalı Yan Panel */
        #sidebar {
            width: 240px;
            background: rgba(0,0,0,0.4);
            border-right: 1px solid var(--border);
            display: flex;
            flex-direction: column;
            padding: 20px;
        }

        .brand {
            font-size: 24px;
            font-weight: bold;
            margin-bottom: 40px;
            text-align: center;
            letter-spacing: 1px;
        }

        .new-btn {
            background: var(--glass);
            border: 1px solid var(--border);
            color: white;
            padding: 12px;
            border-radius: 10px;
            cursor: pointer;
            transition: 0.3s;
        }
        .new-btn:hover { background: var(--accent); border-color: var(--accent); }

        /* Ana Alan */
        #main-chat {
            flex: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        #chat-window {
            width: 100%;
            max-width: 850px;
            flex: 1;
            overflow-y: auto;
            padding: 50px 20px;
            display: flex;
            flex-direction: column;
            gap: 40px;
        }

        .message-row {
            display: flex;
            gap: 20px;
            animation: fadeIn 0.5s ease;
        }

        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } }

        .icon {
            width: 40px;
            height: 40px;
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            flex-shrink: 0;
        }

        .user-icon { background: var(--glass); font-size: 16px; border: 1px solid var(--border); }
        .bot-icon { background: transparent; font-size: 30px; }

        .text {
            line-height: 1.7;
            font-size: 16px;
            color: #d1d1d1;
            padding-top: 4px;
        }

        /* Sade Giriş Alanı */
        .input-area {
            width: 100%;
            max-width: 850px;
            padding: 20px;
            margin-bottom: 20px;
        }

        .input-wrapper {
            background: var(--glass);
            border: 1px solid var(--border);
            border-radius: 16px;
            display: flex;
            align-items: center;
            padding: 8px 18px;
            transition: 0.3s;
        }

        .input-wrapper:focus-within {
            border-color: var(--accent);
            background: rgba(255,255,255,0.06);
        }

        input {
            flex: 1;
            background: transparent;
            border: none;
            color: white;
            padding: 12px;
            font-size: 16px;
            outline: none;
        }

        #send-btn {
            background: none;
            border: none;
            color: #8e918f;
            cursor: pointer;
            font-size: 20px;
            transition: 0.2s;
        }
        #send-btn:hover { color: var(--accent); }

        .status { font-size: 12px; color: #555; text-align: center; margin-top: 8px; }
    </style>
</head>
<body>

    <div id="sidebar">
        <div class="brand">🦭 FOK</div>
        <button class="new-btn" onclick="location.reload()"><i class="fas fa-plus"></i> Yeni Sohbet</button>
        <div style="margin-top: auto; font-size: 11px; color: #444;">Versiyon 4.0 Ultra</div>
    </div>

    <div id="main-chat">
        <div id="chat-window">
            <div id="welcome" style="text-align: center; margin-top: 10vh;">
                <h1 style="font-size: 42px; font-weight: 600; background: linear-gradient(to right, #fff, #888); -webkit-background-clip: text; -webkit-text-fill-color: transparent;">Sana nasıl yardımcı olabilirim?</h1>
            </div>
        </div>

        <div class="input-area">
            <div class="input-wrapper">
                <input type="text" id="user-input" placeholder="Bir mesaj yazın..." onkeypress="if(event.key==='Enter') sendMessage()">
                <button id="send-btn" onclick="sendMessage()"><i class="fas fa-paper-plane"></i></button>
            </div>
            <div class="status">Fok AI bazen hatalı bilgi verebilir.</div>
        </div>
    </div>

    <script>
        async function sendMessage() {
            const input = document.getElementById("user-input");
            const chat = document.getElementById("chat-window");
            const welcome = document.getElementById("welcome");
            const text = input.value.trim();
            if (!text) return;

            if(welcome) welcome.remove();

            chat.innerHTML += `<div class="message-row"><div class="icon user-icon"><i class="fas fa-user"></i></div><div class="text">${text}</div></div>`;
            input.value = "";
            chat.scrollTop = chat.scrollHeight;

            const response = await fetch("/get_response", {
                method: "POST",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify({ message: text })
            });
            const data = await response.json();
            
            chat.innerHTML += `<div class="message-row"><div class="icon bot-icon">🦭</div><div class="text">${data.reply}</div></div>`;
            chat.scrollTop = chat.scrollHeight;
        }
    </script>
</body>
</html>
